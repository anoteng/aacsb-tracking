<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - AACSB Accreditation</title>
    <link rel="stylesheet" href="/aacsb/static/css/style.css">
    <script src="/aacsb/static/js/i18n.js"></script>
    <style>
        .courses-layout {
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 1.5rem;
            align-items: start;
        }
        .course-list-panel {
            position: sticky;
            top: 1rem;
        }
        .course-list { list-style: none; padding: 0; margin: 0; max-height: calc(100vh - 220px); overflow-y: auto; }
        .course-list li {
            padding: 0.65rem 1rem;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
        }
        .course-list li:hover { background: var(--bg-secondary); }
        .course-list li.active { background: var(--primary-light, #e8f0fe); border-left: 3px solid var(--primary); }
        .course-code { font-weight: 600; font-size: 0.9rem; }
        .course-name-small { font-size: 0.8rem; color: var(--text-muted); }
        .coordinator-tag { font-size: 0.75rem; color: var(--text-muted); }
        .prme-badge { display: inline-block; font-size: 0.7rem; font-weight: 600; background: #d1fae5; color: #065f46; padding: 0.1rem 0.4rem; border-radius: 3px; }
        .prme-badge-off { background: #f1f5f9; color: #94a3b8; }

        .detail-section { margin-bottom: 1.5rem; }
        .detail-section h3 { margin: 0 0 0.75rem; font-size: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; }

        .coord-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border-color);
        }
        .coord-row:last-child { border-bottom: none; }
        .coord-actions { display: flex; gap: 0.5rem; }
        .badge-current { background: #d4edda; color: #155724; font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 3px; }
        .badge-past { background: #f8f9fa; color: #6c757d; font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 3px; }

        .goal-row {
            padding: 0.4rem 0;
            border-bottom: 1px solid var(--border-color);
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 0.75rem;
            align-items: start;
            font-size: 0.875rem;
        }
        .goal-row:last-child { border-bottom: none; }
        .level-badge {
            font-size: 0.7rem;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            font-weight: 600;
            white-space: nowrap;
        }
        .level-1 { background: #cfe2ff; color: #084298; }
        .level-2 { background: #fff3cd; color: #664d03; }
        .level-3 { background: #d1e7dd; color: #0a3622; }
        .assessed-dot { color: var(--primary); font-size: 0.7rem; }

        .search-box { margin-bottom: 0.75rem; }
        .empty-detail { color: var(--text-muted); text-align: center; padding: 3rem; }
    </style>
</head>
<body>
    <div id="impersonation-banner" style="display:none; background:#92400e; color:white; padding:0.5rem 1.5rem; font-size:0.875rem; gap:0.75rem; align-items:center;">
        <span data-i18n="Viewing as:">Viewing as:</span>
        <strong id="impersonating-name"></strong>
        <button onclick="stopImpersonation()" style="margin-left:0.5rem; background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.4); color:white; padding:0.15rem 0.75rem; border-radius:4px; cursor:pointer; font-size:0.8rem;" data-i18n="Stop Viewing As">Stop Viewing As</button>
    </div>
    <nav class="nav">
        <div class="container">
            <a href="/aacsb/dashboard" class="nav-brand">AACSB Accreditation</a>
            <ul class="nav-links">
                <li><a href="/aacsb/aol">AOL</a></li>
                <li><a href="/aacsb/aol/courses" class="active" data-i18n="Courses">Courses</a></li>
                <li><a href="/aacsb/research" data-i18n="Research">Research</a></li>
                <li><a href="/aacsb/qualifications" data-i18n="Qualifications">Qualifications</a></li>
                <li><a href="/aacsb/admin" data-i18n="Admin">Admin</a></li>
            </ul>
            <div class="nav-user" id="nav-user"><span>Loading...</span></div>
            <select id="lang-switcher" onchange="i18n.setLang(this.value)" style="margin-left:0.5rem; padding:0.25rem 0.5rem; border:1px solid rgba(255,255,255,0.3); border-radius:4px; font-size:0.875rem; background:#1e40af; color:white;">
                <option value="en">EN</option>
                <option value="no">NO</option>
            </select>
        </div>
    </nav>

    <header class="page-header">
        <div class="container">
            <h1 class="page-title" data-i18n="Courses">Courses</h1>
            <p class="page-subtitle" data-i18n="Course catalogue with coordinators, programmes, and learning goals">Course catalogue with coordinators, programmes, and learning goals</p>
        </div>
    </header>

    <main class="container" style="padding-bottom: 3rem;">
        <div class="courses-layout">
            <!-- Left: course list -->
            <div class="course-list-panel card" style="padding: 1rem;">
                <div class="search-box">
                    <input type="text" id="course-search" class="form-input" placeholder="Search by code or name…" data-i18n-placeholder="Search by code or name…">
                </div>
                <ul class="course-list" id="course-list">
                    <li><div class="loading"><div class="spinner"></div></div></li>
                </ul>
            </div>

            <!-- Right: course detail -->
            <div id="course-detail">
                <div class="empty-detail" data-i18n="Select a course to see details">Select a course to see details</div>
            </div>
        </div>
    </main>

    <!-- Add coordinator modal -->
    <div id="add-coord-modal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <div class="modal-header">
                <h2 id="add-coord-title" data-i18n="Set Course Coordinator">Set Course Coordinator</h2>
                <button class="modal-close" onclick="closeCoordModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label" data-i18n="Staff member">Staff member</label>
                    <input type="text" id="coord-user-search" class="form-input" placeholder="Search by name or email…" data-i18n-placeholder="Search by name or email…">
                    <div id="coord-user-results" style="margin-top:0.5rem;"></div>
                    <input type="hidden" id="coord-user-id">
                    <div id="coord-user-selected" class="text-sm text-muted" style="margin-top:0.25rem;"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">
                        <span data-i18n="Start date">Start date</span> <span class="text-muted" data-i18n="(optional)">(optional)</span>
                    </label>
                    <input type="date" id="coord-start-date" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">
                        <span data-i18n="End date">End date</span> <span class="text-muted" data-i18n="(optional)">(optional)</span>
                    </label>
                    <input type="date" id="coord-end-date" class="form-input">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeCoordModal()" data-i18n="Cancel">Cancel</button>
                <button class="btn btn-primary" onclick="saveCoordinator()" data-i18n="Save">Save</button>
            </div>
        </div>
    </div>

    <!-- Edit coordinator dates modal -->
    <div id="edit-coord-modal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <div class="modal-header">
                <h2 data-i18n="Edit Coordinator Dates">Edit Coordinator Dates</h2>
                <button class="modal-close" onclick="closeEditCoordModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-coord-id">
                <div class="form-group">
                    <label class="form-label" data-i18n="Start date">Start date</label>
                    <input type="date" id="edit-coord-start" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="End date">End date</label>
                    <input type="date" id="edit-coord-end" class="form-input">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeEditCoordModal()" data-i18n="Cancel">Cancel</button>
                <button class="btn btn-primary" onclick="saveEditCoord()" data-i18n="Save">Save</button>
            </div>
        </div>
    </div>

    <script src="/aacsb/static/aol/js/api.js"></script>
    <script>
        i18n.init();
        const { t } = i18n;
        const locName = obj => i18n.getLang() === 'no' ? (obj.name_no || obj.name_eng) : (obj.name_eng || obj.name_no);

        const API = '/aacsb/api';
        let currentUser = null;
        let isAdmin = false;
        let allCourses = [];
        let selectedCourseId = null;
        let coordSearchTimeout = null;

        const LEVEL_KEYS = { 1: 'Introduced', 2: 'Developing', 3: 'Mastery' };

        async function init() {
            try {
                currentUser = await api.getCurrentUser();
                isAdmin = currentUser.roles.some(r => ['system_admin','admin_staff'].includes(r));
                renderNav();
                await loadCourses();
            } catch (e) {
                window.location.href = '/aacsb/login';
            }
        }

        function renderNav() {
            document.getElementById('nav-user').innerHTML = `
                <span>${currentUser.firstname} ${currentUser.lastname}</span>
                <a href="/aacsb/settings" class="btn btn-sm btn-outline" style="color:white;border-color:rgba(255,255,255,0.3);">${t('Settings')}</a>
                <button onclick="api.logout().then(()=>window.location.href='/aacsb/login')" class="btn btn-sm btn-outline" style="color:white;border-color:rgba(255,255,255,0.3);">${t('Logout')}</button>
            `;
            if (currentUser.impersonation && currentUser.impersonation.active) {
                const banner = document.getElementById('impersonation-banner');
                if (banner) {
                    document.getElementById('impersonating-name').textContent = currentUser.impersonation.viewing_as.name;
                    banner.style.display = 'flex';
                }
            }
        }

        async function stopImpersonation() {
            await fetch('/aacsb/api/admin/stop-impersonation', { method: 'POST', credentials: 'include' });
            location.reload();
        }

        async function loadCourses() {
            const res = await fetch(`${API}/aol/courses`, { credentials: 'include' });
            allCourses = await res.json();
            renderCourseList(allCourses);
        }

        function renderCourseList(courses) {
            const ul = document.getElementById('course-list');
            if (courses.length === 0) {
                ul.innerHTML = `<li style="color:var(--text-muted);padding:1rem;">${t('No courses found')}</li>`;
                return;
            }
            ul.innerHTML = courses.map(c => `
                <li onclick="selectCourse(${c.id})" id="course-item-${c.id}" class="${c.id === selectedCourseId ? 'active' : ''}">
                    <div style="display:flex;align-items:center;gap:0.4rem;">
                        <span class="course-code">${c.course_code}-${c.course_version}</span>
                        ${c.prme_report ? `<span class="prme-badge">PRME</span>` : ''}
                    </div>
                    <span class="course-name-small">${c.name_no || c.name_eng || ''}</span>
                    ${c.coordinator ? `<span class="coordinator-tag">${c.coordinator.name}</span>` : ''}
                </li>
            `).join('');
        }

        async function selectCourse(id) {
            selectedCourseId = id;
            document.querySelectorAll('.course-list li').forEach(li => li.classList.remove('active'));
            const item = document.getElementById(`course-item-${id}`);
            if (item) item.classList.add('active');

            document.getElementById('course-detail').innerHTML = '<div class="loading"><div class="spinner"></div></div>';

            const res = await fetch(`${API}/aol/courses/${id}`, { credentials: 'include' });
            const course = await res.json();
            renderDetail(course);
        }

        function renderDetail(course) {
            const coordinatorSection = renderCoordinators(course);
            const programmesSection = renderProgrammes(course.programmes);
            const goalsSection = renderGoals(course.goals);

            document.getElementById('course-detail').innerHTML = `
                <div class="card" style="padding:1.5rem;">
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.5rem;">
                        <div>
                            <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.15rem;">
                                <h2 style="margin:0;">${course.course_code}-${course.course_version} &nbsp;<span class="text-muted" style="font-weight:normal;font-size:1rem;">${course.ects} ECTS</span></h2>
                                <span id="prme-badge" class="prme-badge ${course.prme_report ? '' : 'prme-badge-off'}">${course.prme_report ? 'PRME' : 'PRME'}</span>
                            </div>
                            ${course.name_no ? `<div style="font-size:1.1rem;margin-top:0.25rem;">${course.name_no}</div>` : ''}
                            ${course.name_eng && course.name_eng !== course.name_no ? `<div class="text-muted">${course.name_eng}</div>` : ''}
                        </div>
                        <div style="display:flex;gap:0.5rem;align-items:center;">
                            ${isAdmin ? `<button class="btn btn-sm btn-outline" id="prme-btn" onclick="togglePrme(${course.id}, ${course.prme_report})" title="${t('Toggle PRME reporting')}">${course.prme_report ? t('Unmark PRME') : t('Mark as PRME')}</button>` : ''}
                            <a href="/aacsb/aol/course/${course.id}" class="btn btn-primary btn-sm">${t('Edit Matrix')}</a>
                        </div>
                    </div>

                    <div class="detail-section">
                        <h3>
                            ${t('Course Coordinator')}
                            ${isAdmin ? `<button class="btn btn-sm btn-primary" style="float:right;" onclick="openAddCoord(${course.id})">${t('+ Add')}</button>` : ''}
                        </h3>
                        ${coordinatorSection}
                    </div>

                    <div class="detail-section">
                        <h3>${t('Study Programmes')}</h3>
                        ${programmesSection}
                    </div>

                    <div class="detail-section">
                        <h3>${t('Learning Goals')}</h3>
                        ${goalsSection}
                    </div>
                </div>
            `;
        }

        function renderCoordinators(course) {
            if (course.coordinators.length === 0) {
                return `<p class="text-muted">${t('No coordinator assigned.')}</p>`;
            }
            return course.coordinators.map(cc => `
                <div class="coord-row">
                    <div>
                        <strong>${cc.name}</strong>
                        <span class="${cc.is_current ? 'badge-current' : 'badge-past'}">${cc.is_current ? t('Current') : t('Past')}</span>
                        <div class="text-sm text-muted">
                            ${cc.email}
                            ${cc.start_date || cc.end_date
                                ? ' · ' + (cc.start_date ? formatDate(cc.start_date) : '?') + ' – ' + (cc.end_date ? formatDate(cc.end_date) : t('present'))
                                : ''}
                        </div>
                    </div>
                    ${isAdmin ? `
                        <div class="coord-actions">
                            <button class="btn btn-sm btn-outline" onclick="openEditCoord(${cc.id}, '${cc.start_date || ''}', '${cc.end_date || ''}')">${t('Edit dates')}</button>
                            <button class="btn btn-sm btn-outline" style="color:var(--danger);" onclick="removeCoord(${course.id}, ${cc.id})">${t('Remove')}</button>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        function renderProgrammes(programmes) {
            if (programmes.length === 0) return `<p class="text-muted">${t('Not linked to any programme.')}</p>`;
            return `<table style="width:100%;font-size:0.875rem;">
                <thead><tr>
                    <th style="text-align:left;padding:0.35rem 0;">${t('Code')}</th>
                    <th style="text-align:left;padding:0.35rem 0;">${t('Programme')}</th>
                    <th style="text-align:left;padding:0.35rem 0;">${t('Semester')}</th>
                </tr></thead>
                <tbody>
                ${programmes.map(p => `
                    <tr>
                        <td style="padding:0.35rem 0;"><a href="/aacsb/aol/programme/${p.programme_id}">${p.programme_code}</a></td>
                        <td style="padding:0.35rem 0;">${locName(p)}</td>
                        <td style="padding:0.35rem 0;">${p.semester ? p.semester + '. sem.' : '–'}</td>
                    </tr>
                `).join('')}
                </tbody>
            </table>`;
        }

        function renderGoals(goals) {
            if (goals.length === 0) return `<p class="text-muted">${t('Not mapped to any learning goals.')}</p>`;
            return goals.map(g => `
                <div class="goal-row">
                    <span class="level-badge level-${g.learning_level}">${t(LEVEL_KEYS[g.learning_level] || '')}</span>
                    <div>
                        <div class="text-sm text-muted">${g.programme_code}</div>
                        <div>${g.goal_no || g.goal_eng || ''}</div>
                    </div>
                    ${g.is_assessed ? `<span class="assessed-dot" title="${t('Assessed')}">● ${t('Assessed')}</span>` : '<span></span>'}
                </div>
            `).join('');
        }

        function formatDate(iso) {
            if (!iso) return '';
            const locale = i18n.getLang() === 'no' ? 'no-NO' : 'en-GB';
            return new Date(iso).toLocaleDateString(locale, { year: 'numeric', month: 'short', day: 'numeric' });
        }

        // --- Search ---
        document.getElementById('course-search').addEventListener('input', e => {
            const q = e.target.value.toLowerCase();
            const filtered = q.length < 2
                ? allCourses
                : allCourses.filter(c =>
                    c.course_code.toLowerCase().includes(q)
                    || (c.name_no || '').toLowerCase().includes(q)
                    || (c.name_eng || '').toLowerCase().includes(q)
                );
            renderCourseList(filtered);
        });

        // --- Coordinator modals ---
        let addCoordCourseId = null;

        function openAddCoord(courseId) {
            addCoordCourseId = courseId;
            document.getElementById('coord-user-id').value = '';
            document.getElementById('coord-user-selected').textContent = '';
            document.getElementById('coord-user-search').value = '';
            document.getElementById('coord-user-results').innerHTML = '';
            document.getElementById('coord-start-date').value = '';
            document.getElementById('coord-end-date').value = '';
            const modal = document.getElementById('add-coord-modal');
            modal.style.display = 'flex';
            requestAnimationFrame(() => modal.classList.add('active'));
        }

        function closeCoordModal() {
            const modal = document.getElementById('add-coord-modal');
            modal.classList.remove('active');
            modal.style.display = 'none';
        }

        document.getElementById('coord-user-search').addEventListener('input', e => {
            clearTimeout(coordSearchTimeout);
            const q = e.target.value.trim();
            if (q.length < 2) { document.getElementById('coord-user-results').innerHTML = ''; return; }
            coordSearchTimeout = setTimeout(() => searchUsers(q), 300);
        });

        let allUsers = null;

        async function searchUsers(q) {
            if (!allUsers) {
                const res = await fetch(`${API}/admin/users`, { credentials: 'include' });
                allUsers = await res.json();
            }
            const lower = q.toLowerCase();
            const matches = allUsers.filter(u =>
                (u.firstname + ' ' + u.lastname).toLowerCase().includes(lower)
                || (u.email || '').toLowerCase().includes(lower)
            );
            const container = document.getElementById('coord-user-results');
            container.innerHTML = matches.slice(0, 8).map(u => `
                <div style="padding:0.4rem 0.75rem;cursor:pointer;border:1px solid var(--border-color);border-radius:4px;margin-bottom:0.25rem;"
                     onclick="selectCoordUser(${u.id || u.uuid}, '${(u.firstname + ' ' + u.lastname).replace(/'/g, "\\'")}')">
                    ${u.firstname} ${u.lastname} <span class="text-muted text-sm">${u.email}</span>
                </div>
            `).join('');
        }

        function selectCoordUser(id, name) {
            document.getElementById('coord-user-id').value = id;
            document.getElementById('coord-user-selected').textContent = '✓ ' + name;
            document.getElementById('coord-user-results').innerHTML = '';
            document.getElementById('coord-user-search').value = '';
        }

        async function saveCoordinator() {
            const userId = document.getElementById('coord-user-id').value;
            if (!userId) { alert(t('Please select a staff member.')); return; }
            const start = document.getElementById('coord-start-date').value;
            const end = document.getElementById('coord-end-date').value;

            const res = await fetch(`${API}/aol/courses/${addCoordCourseId}/coordinators`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ user_id: parseInt(userId), start_date: start || null, end_date: end || null }),
            });

            if (res.ok) {
                closeCoordModal();
                selectCourse(addCoordCourseId);
                loadCourses();
            } else {
                const d = await res.json();
                alert(t('Error: ') + (d.detail || t('Could not save')));
            }
        }

        let editCoordId = null;

        function openEditCoord(coordId, startDate, endDate) {
            editCoordId = coordId;
            document.getElementById('edit-coord-id').value = coordId;
            document.getElementById('edit-coord-start').value = startDate;
            document.getElementById('edit-coord-end').value = endDate;
            const modal = document.getElementById('edit-coord-modal');
            modal.style.display = 'flex';
            requestAnimationFrame(() => modal.classList.add('active'));
        }

        function closeEditCoordModal() {
            const modal = document.getElementById('edit-coord-modal');
            modal.classList.remove('active');
            modal.style.display = 'none';
        }

        async function saveEditCoord() {
            const start = document.getElementById('edit-coord-start').value;
            const end = document.getElementById('edit-coord-end').value;

            const res = await fetch(`${API}/aol/courses/${selectedCourseId}/coordinators/${editCoordId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ start_date: start || null, end_date: end || null }),
            });

            if (res.ok) {
                closeEditCoordModal();
                selectCourse(selectedCourseId);
            } else {
                const d = await res.json();
                alert(t('Error: ') + (d.detail || t('Could not update')));
            }
        }

        async function removeCoord(courseId, coordId) {
            if (!confirm(t('Remove this coordinator entry?'))) return;
            const res = await fetch(`${API}/aol/courses/${courseId}/coordinators/${coordId}`, {
                method: 'DELETE',
                credentials: 'include',
            });
            if (res.ok) {
                selectCourse(courseId);
                loadCourses();
            } else {
                alert(t('Could not remove coordinator.'));
            }
        }

        async function togglePrme(courseId, currentValue) {
            const res = await fetch(`${API}/aol/courses/${courseId}/prme`, {
                method: 'PATCH',
                credentials: 'include',
            });
            if (!res.ok) { alert(t('Could not update PRME status.')); return; }
            const data = await res.json();
            // Update badge in detail
            const badge = document.getElementById('prme-badge');
            if (badge) {
                badge.classList.toggle('prme-badge-off', !data.prme_report);
            }
            // Update button text
            const btn = document.getElementById('prme-btn');
            if (btn) {
                btn.textContent = data.prme_report ? t('Unmark PRME') : t('Mark as PRME');
                btn.setAttribute('onclick', `togglePrme(${courseId}, ${data.prme_report})`);
            }
            // Update the list badge
            const listItem = document.getElementById(`course-item-${courseId}`);
            if (listItem) {
                const existing = listItem.querySelector('.prme-badge');
                if (data.prme_report && !existing) {
                    listItem.querySelector('div').insertAdjacentHTML('beforeend', `<span class="prme-badge">PRME</span>`);
                } else if (!data.prme_report && existing) {
                    existing.remove();
                }
            }
            // Keep local data in sync
            const c = allCourses.find(c => c.id === courseId);
            if (c) c.prme_report = data.prme_report;
        }

        init();
    </script>
</body>
</html>
