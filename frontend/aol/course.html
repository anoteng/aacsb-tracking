<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course - AOL - AACSB Accreditation</title>
    <link rel="stylesheet" href="/aacsb/static/css/style.css">
    <script src="/aacsb/static/js/i18n.js"></script>
    <style>
        .programme-section {
            background: white;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-bottom: 2rem;
            overflow: hidden;
        }
        .programme-section-header {
            background: var(--primary);
            color: white;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .programme-section-header h2 {
            margin: 0;
            font-size: 1.1rem;
        }
        .programme-section-header .semester-badge {
            font-size: 0.8rem;
            opacity: 0.85;
        }
        .goals-table {
            width: 100%;
            border-collapse: collapse;
        }
        .goals-table th {
            background: var(--light);
            padding: 0.6rem 1rem;
            text-align: left;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--secondary);
            border-bottom: 1px solid var(--border);
        }
        .goals-table td {
            padding: 0.65rem 1rem;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        .goals-table tr:last-child td {
            border-bottom: none;
        }
        .goals-table tr:hover td {
            background: #f8fafc;
        }
        .category-row td {
            background: #f1f5f9;
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--secondary);
            padding: 0.4rem 1rem;
        }
        .goal-text {
            font-size: 0.9rem;
            max-width: 500px;
        }
        .goal-number {
            font-weight: 600;
            color: var(--primary);
            white-space: nowrap;
        }
        .level-select {
            padding: 0.25rem 0.5rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.875rem;
            background: white;
        }
        .assessed-check {
            width: 1.1rem;
            height: 1.1rem;
            cursor: pointer;
        }
        .programme-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 1rem;
        }
        .save-status {
            font-size: 0.875rem;
            color: var(--secondary);
        }
        .save-status.success { color: var(--success); }
        .save-status.error { color: var(--danger); }
        .no-goals {
            padding: 2rem;
            text-align: center;
            color: var(--secondary);
        }
        .level-0 { color: #94a3b8; }
        .level-1 { color: #1e40af; }
        .level-2 { color: #92400e; }
        .level-3 { color: #065f46; }
    </style>
</head>
<body>
    <div id="impersonation-banner" style="display:none; background:#92400e; color:white; padding:0.5rem 1.5rem; font-size:0.875rem; gap:0.75rem; align-items:center;">
        <span data-i18n="Viewing as:">Viewing as:</span>
        <strong id="impersonating-name"></strong>
        <button onclick="stopImpersonation()" style="margin-left:0.5rem; background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.4); color:white; padding:0.15rem 0.75rem; border-radius:4px; cursor:pointer; font-size:0.8rem;" data-i18n="Stop Viewing As">Stop Viewing As</button>
    </div>
    <nav class="nav">
        <div class="container">
            <a href="/aacsb/dashboard" class="nav-brand">AACSB Accreditation</a>
            <ul class="nav-links">
                <li><a href="/aacsb/aol">AOL</a></li>
                <li><a href="/aacsb/aol/courses" data-i18n="Courses">Courses</a></li>
                <li><a href="/aacsb/research" data-i18n="Research">Research</a></li>
                <li><a href="/aacsb/qualifications" data-i18n="Qualifications">Qualifications</a></li>
                <li><a href="/aacsb/admin" data-i18n="Admin">Admin</a></li>
            </ul>
            <div class="nav-user" id="nav-user"><span data-i18n="Loading...">Loading...</span></div>
            <select id="lang-switcher" onchange="i18n.setLang(this.value)" style="margin-left:0.5rem; padding:0.25rem 0.5rem; border:1px solid rgba(255,255,255,0.3); border-radius:4px; font-size:0.875rem; background:#1e40af; color:white;">
                <option value="en">EN</option>
                <option value="no">NO</option>
            </select>
        </div>
    </nav>

    <header class="page-header">
        <div class="container">
            <div>
                <a href="/aacsb/aol/courses" class="text-sm text-muted">&larr; <span data-i18n="Back to courses">Back to courses</span></a>
                <h1 class="page-title" id="course-title"><span data-i18n="Loading...">Loading...</span></h1>
                <p class="page-subtitle" id="course-subtitle"></p>
            </div>
        </div>
    </header>

    <main class="container" style="margin-top: 2rem;">
        <div id="programmes-container">
            <div class="loading"><div class="spinner"></div></div>
        </div>
    </main>

    <script src="/aacsb/static/aol/js/api.js"></script>
    <script>
        const { t } = i18n;
        const locName = obj => i18n.getLang() === 'no' ? (obj.name_no || obj.name_eng) : (obj.name_eng || obj.name_no);

        const courseId = parseInt(window.location.pathname.split('/').pop());
        let courseData = null;

        async function init() {
            await i18n.init();

            try {
                const user = await api.getCurrentUser();
                renderNav(user);
            } catch {
                window.location.href = window.APP_BASE + '/login';
                return;
            }

            try {
                courseData = await api.request(`/aol/courses/${courseId}/matrix-view`);
                renderPage();
            } catch (err) {
                document.getElementById('programmes-container').innerHTML =
                    `<div class="alert alert-error">${err.message}</div>`;
            }
        }

        function renderNav(user) {
            const navUser = document.getElementById('nav-user');
            navUser.innerHTML = `
                <span>${user.full_name}</span>
                <a href="${window.APP_BASE}/settings" style="margin-left:0.75rem; color:rgba(255,255,255,0.7); font-size:0.8rem;">${t('Settings')}</a>
                <a href="#" onclick="api.logout().then(()=>location.href=window.APP_BASE+'/login')" style="margin-left:0.75rem; color:rgba(255,255,255,0.7); font-size:0.8rem;">${t('Logout')}</a>
            `;
            if (user.impersonation && user.impersonation.active) {
                const banner = document.getElementById('impersonation-banner');
                if (banner) {
                    document.getElementById('impersonating-name').textContent = user.impersonation.viewing_as.name;
                    banner.style.display = 'flex';
                }
            }
        }

        async function stopImpersonation() {
            await fetch(window.APP_BASE + '/api/admin/stop-impersonation', { method: 'POST', credentials: 'include' });
            location.reload();
        }

        function renderPage() {
            const courseName = locName(courseData);
            document.getElementById('course-title').textContent =
                `${courseData.course_code} – ${courseName}`;
            document.getElementById('course-subtitle').textContent =
                `${courseData.ects} ECTS`;
            document.title = `${courseData.course_code} - AOL - AACSB`;

            const container = document.getElementById('programmes-container');

            if (courseData.programmes.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>${t('Not part of any programme')}</h3>
                        <p>${t('This course has not been added to any study programme yet.')}</p>
                    </div>`;
                return;
            }

            container.innerHTML = courseData.programmes.map(prog => renderProgramme(prog)).join('');
        }

        function renderProgramme(prog) {
            const progName = locName(prog);
            const semLabel = i18n.getLang() === 'no'
                ? `${prog.semester}. semester`
                : `${prog.semester}${['st','nd','rd'][prog.semester-1]||'th'} semester`;

            const goalsHtml = prog.goals.length === 0
                ? `<div class="no-goals">${t('No learning goals defined for this programme.')}</div>`
                : renderGoalsTable(prog);

            return `
                <div class="programme-section" id="prog-${prog.programme_id}">
                    <div class="programme-section-header">
                        <div>
                            <h2>${prog.programme_code} – ${progName}</h2>
                        </div>
                        <span class="semester-badge">${semLabel}</span>
                    </div>
                    ${goalsHtml}
                    ${prog.goals.length > 0 ? `
                    <div class="programme-footer">
                        <span class="save-status" id="status-${prog.programme_id}"></span>
                        <button class="btn btn-primary" onclick="saveProgramme(${prog.programme_id})">${t('Save')}</button>
                    </div>` : ''}
                </div>`;
        }

        function renderGoalsTable(prog) {
            const isNo = i18n.getLang() === 'no';
            // Group goals by category
            const categories = [];
            let lastCatId = null;
            prog.goals.forEach((g, idx) => {
                if (g.category_id !== lastCatId) {
                    categories.push({ id: g.category_id, nameNo: g.category_name_no, nameEng: g.category_name_eng, startIdx: idx });
                    lastCatId = g.category_id;
                }
            });

            let rows = '';
            let globalIdx = 0;
            categories.forEach(cat => {
                const catName = isNo ? (cat.nameNo || cat.nameEng) : (cat.nameEng || cat.nameNo);
                rows += `<tr class="category-row"><td colspan="4">${catName || t('Uncategorized')}</td></tr>`;
                const catGoals = prog.goals.filter(g => g.category_id === cat.id);
                catGoals.forEach(g => {
                    globalIdx++;
                    const goalText = isNo ? (g.goal_no || g.goal_eng) : (g.goal_eng || g.goal_no);
                    rows += `
                        <tr>
                            <td class="goal-number">LO${globalIdx}</td>
                            <td class="goal-text">${goalText || '-'}</td>
                            <td>
                                <select class="level-select" data-goal="${g.goal_id}" data-prog="${prog.programme_id}">
                                    <option value="0" ${g.learning_level === 0 ? 'selected' : ''}>– ${t('None')}</option>
                                    <option value="1" ${g.learning_level === 1 ? 'selected' : ''}>I – ${t('Introduced')}</option>
                                    <option value="2" ${g.learning_level === 2 ? 'selected' : ''}>D – ${t('Developing')}</option>
                                    <option value="3" ${g.learning_level === 3 ? 'selected' : ''}>M – ${t('Mastery')}</option>
                                </select>
                            </td>
                            <td>
                                <input type="checkbox" class="assessed-check"
                                    data-goal="${g.goal_id}" data-prog="${prog.programme_id}"
                                    ${g.is_assessed ? 'checked' : ''}
                                    title="${t('Assessed')}">
                            </td>
                        </tr>`;
                });
            });

            return `
                <table class="goals-table">
                    <thead>
                        <tr>
                            <th style="width:60px">LO</th>
                            <th>${t('Learning Goal')}</th>
                            <th style="width:180px">${t('Learning Level')}</th>
                            <th style="width:80px">${t('Assessed')}</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>`;
        }

        async function saveProgramme(programmeId) {
            const statusEl = document.getElementById(`status-${programmeId}`);
            statusEl.textContent = '';
            statusEl.className = 'save-status';

            const section = document.getElementById(`prog-${programmeId}`);
            const selects = section.querySelectorAll(`.level-select[data-prog="${programmeId}"]`);
            const checks = section.querySelectorAll(`.assessed-check[data-prog="${programmeId}"]`);

            const updates = [];
            selects.forEach(sel => {
                const goalId = parseInt(sel.dataset.goal);
                const check = section.querySelector(`.assessed-check[data-goal="${goalId}"]`);
                updates.push({
                    goal_id: goalId,
                    learning_level: parseInt(sel.value),
                    is_assessed: check ? check.checked : false,
                });
            });

            try {
                await Promise.all(updates.map(u =>
                    api.updateMatrixEntry(u.goal_id, courseId, {
                        learning_level: u.learning_level,
                        is_assessed: u.is_assessed,
                    })
                ));
                statusEl.textContent = t('Saved!');
                statusEl.className = 'save-status success';
                setTimeout(() => { statusEl.textContent = ''; }, 3000);
            } catch (err) {
                statusEl.textContent = t('Failed to save: ') + err.message;
                statusEl.className = 'save-status error';
            }
        }

        init();
    </script>
</body>
</html>
