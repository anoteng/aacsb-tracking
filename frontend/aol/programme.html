<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programme - AOL - AACSB Accreditation</title>
    <link rel="stylesheet" href="/aacsb/static/css/style.css">
    <script src="/aacsb/static/js/i18n.js"></script>
</head>
<body>
    <div id="impersonation-banner" style="display:none; background:#92400e; color:white; padding:0.5rem 1.5rem; font-size:0.875rem; gap:0.75rem; align-items:center;">
        <span data-i18n="Viewing as:">Viewing as:</span>
        <strong id="impersonating-name"></strong>
        <button onclick="stopImpersonation()" style="margin-left:0.5rem; background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.4); color:white; padding:0.15rem 0.75rem; border-radius:4px; cursor:pointer; font-size:0.8rem;" data-i18n="Stop Viewing As">Stop Viewing As</button>
    </div>
    <nav class="nav">
        <div class="container">
            <a href="/aacsb/dashboard" class="nav-brand">AACSB Accreditation</a>
            <ul class="nav-links">
                <li><a href="/aacsb/aol" class="active">AOL</a></li>
                <li><a href="/aacsb/aol/courses" data-i18n="Courses">Courses</a></li>
                <li><a href="/aacsb/research" data-i18n="Research">Research</a></li>
                <li><a href="/aacsb/qualifications" data-i18n="Qualifications">Qualifications</a></li>
                <li><a href="/aacsb/admin" data-i18n="Admin">Admin</a></li>
            </ul>
            <div class="nav-user" id="nav-user">
                <span>Loading...</span>
            </div>
            <select id="lang-switcher" onchange="i18n.setLang(this.value)" style="margin-left:0.5rem; padding:0.25rem 0.5rem; border:1px solid rgba(255,255,255,0.3); border-radius:4px; font-size:0.875rem; background:#1e40af; color:white;">
                <option value="en">EN</option>
                <option value="no">NO</option>
            </select>
        </div>
    </nav>

    <header class="page-header">
        <div class="container">
            <div>
                <a href="/aacsb/aol" class="text-sm text-muted">&larr; <span data-i18n="Back to programmes">Back to programmes</span></a>
                <h1 class="page-title" id="programme-name">Loading...</h1>
                <p class="page-subtitle" id="programme-code"></p>
            </div>
            <div id="admin-actions"></div>
        </div>
    </header>

    <main class="container">
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="goals" data-i18n="Learning Goals">Learning Goals</button>
            <button class="tab" data-tab="matrix" data-i18n="Curriculum Matrix">Curriculum Matrix</button>
            <button class="tab" data-tab="courses" data-i18n="Courses">Courses</button>
            <button class="tab" data-tab="plan" data-i18n="Measurement Plan">Measurement Plan</button>
            <button class="tab" data-tab="results" data-i18n="Results">Results</button>
        </div>

        <!-- Goals Tab -->
        <div id="tab-goals" class="tab-content">
            <div class="flex-between mb-2">
                <h2 data-i18n="Learning Goals">Learning Goals</h2>
                <div style="display:flex; gap:0.5rem; align-items:center;">
                    <label id="history-toggle-label" class="hidden" style="font-size:0.875rem; display:flex; align-items:center; gap:0.4rem; cursor:pointer;">
                        <input type="checkbox" id="show-history-cb" onchange="toggleHistory(this.checked)">
                        <span data-i18n="Show history">Show history</span>
                    </label>
                    <select id="history-year-filter" class="hidden" onchange="renderGoals()" style="font-size:0.875rem; padding:0.2rem 0.4rem; border:1px solid #d1d5db; border-radius:4px;">
                        <option value="all" data-i18n="All years">All years</option>
                    </select>
                    <button class="btn btn-primary hidden" id="add-goal-btn" onclick="showAddGoalModal()" data-i18n="+ Add Goal">
                        + Add Goal
                    </button>
                </div>
            </div>
            <div id="goals-list">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>

        <!-- Matrix Tab -->
        <div id="tab-matrix" class="tab-content hidden">
            <div id="matrix-container">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>

        <!-- Measurement Plan Tab -->
        <div id="tab-plan" class="tab-content hidden">
            <div id="plan-container">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>

        <!-- Results Tab -->
        <div id="tab-results" class="tab-content hidden">
            <div id="results-container">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>

        <!-- Courses Tab -->
        <div id="tab-courses" class="tab-content hidden">
            <div class="flex-between mb-2">
                <h2 data-i18n="Courses in Programme">Courses in Programme</h2>
                <button class="btn btn-primary hidden" id="add-course-btn" onclick="showAddCourseModal()" data-i18n="+ Add Course">
                    + Add Course
                </button>
            </div>
            <div id="courses-list">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>

        <!-- Goal Detail / Rubrics -->
        <div id="goal-detail" class="hidden">
            <div class="flex-between mb-2">
                <div>
                    <a href="#" onclick="hideGoalDetail(); return false;" class="text-sm text-muted">&larr; <span data-i18n="Back to goals">Back to goals</span></a>
                    <h2 id="goal-detail-title"></h2>
                </div>
            </div>
            <div id="rubrics-container"></div>
        </div>
    </main>

    <script src="/aacsb/static/aol/js/api.js"></script>
    <script src="/aacsb/static/aol/js/matrix.js"></script>
    <script src="/aacsb/static/aol/js/rubric.js"></script>
    <script>
        const { t } = i18n;
        const locName = obj => i18n.getLang() === 'no' ? (obj.name_no || obj.name_eng) : (obj.name_eng || obj.name_no);

        // Get programme ID from URL
        const programmeId = parseInt(window.location.pathname.split('/').pop());

        let user = null;
        let programme = null;
        let goals = [];
        let categories = [];
        let courses = [];
        let matrixComponent = null;
        let showHistory = false;
        let planLoaded = false;
        let planYears = [];
        let planSemesters = [];
        let planSchedule = [];  // flat list of schedule entries
        let semesters = [];  // teaching periods from /aol/semesters
        let resultsLoaded = false;

        async function init() {
            try {
                await i18n.init();

                // Load user
                user = await api.getCurrentUser();
                renderNav();

                // Load programme
                programme = await api.getProgramme(programmeId);
                document.getElementById('programme-name').textContent = locName(programme);
                document.getElementById('programme-code').textContent = programme.programme_code;
                document.title = `${programme.programme_code} - AOL - AACSB`;

                // Load categories
                categories = await api.getCategories();

                // Show admin buttons
                if (isAdmin()) {
                    document.getElementById('add-goal-btn').classList.remove('hidden');
                    document.getElementById('add-course-btn').classList.remove('hidden');
                    document.getElementById('history-toggle-label').classList.remove('hidden');
                }

                // Load initial tab
                loadGoals();
                setupTabs();
            } catch (error) {
                console.error('Init failed:', error);
                if (error.message === 'Unauthorized') {
                    window.location.href = '/aacsb/login';
                }
            }
        }

        function renderNav() {
            const navUser = document.getElementById('nav-user');
            navUser.innerHTML = `
                <span>${user.firstname} ${user.lastname}</span>
                <a href="/aacsb/settings" class="btn btn-sm btn-outline" style="color: white; border-color: rgba(255,255,255,0.3);">
                    ${t('Settings')}
                </a>
                <button onclick="logout()" class="btn btn-sm btn-outline" style="color: white; border-color: rgba(255,255,255,0.3);">
                    ${t('Logout')}
                </button>
            `;

            if (user.impersonation && user.impersonation.active) {
                const banner = document.getElementById('impersonation-banner');
                if (banner) {
                    document.getElementById('impersonating-name').textContent = user.impersonation.viewing_as.name;
                    banner.style.display = 'flex';
                }
            }
        }

        async function stopImpersonation() {
            await fetch('/aacsb/api/admin/stop-impersonation', { method: 'POST', credentials: 'include' });
            location.reload();
        }

        async function logout() {
            await api.logout();
            window.location.href = '/aacsb/login';
        }

        function isAdmin() {
            if (!user || !user.roles) return false;
            if (user.roles.includes('system_admin')) return true;
            if (user.roles.includes('programme_leader')) return true;
            if (user.programme_roles) {
                return user.programme_roles.some(
                    pr => pr.programme_id === programmeId && pr.role_name === 'admin_staff'
                );
            }
            return false;
        }

        function isSystemAdmin() {
            return user && user.roles && user.roles.includes('system_admin');
        }

        function canEditGoal(goal) {
            if (isAdmin()) return true;
            if (user.roles.includes('programme_leader')) return true;
            if (goal.assigned_staff) {
                return goal.assigned_staff.some(s => s.user_id === user.id);
            }
            return false;
        }

        function setupTabs() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');

                    const tabName = tab.dataset.tab;
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                    document.getElementById(`tab-${tabName}`).classList.remove('hidden');

                    document.getElementById('goal-detail').classList.add('hidden');

                    if (tabName === 'matrix' && !matrixComponent) {
                        matrixComponent = new MatrixComponent('matrix-container', programmeId);
                        window.app = { isAdmin, canEditGoal };
                        matrixComponent.load();
                    } else if (tabName === 'courses' && courses.length === 0) {
                        loadCourses();
                    } else if (tabName === 'plan' && !planLoaded) {
                        loadMeasurementPlan();
                    } else if (tabName === 'results' && !resultsLoaded) {
                        loadResults();
                    }
                });
            });
        }

        async function loadGoals() {
            const container = document.getElementById('goals-list');
            container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            try {
                goals = await api.getGoals(programmeId, showHistory);
                renderGoals();
            } catch (error) {
                container.innerHTML = `<div class="alert alert-error">${error.message}</div>`;
            }
        }

        async function toggleHistory(checked) {
            showHistory = checked;
            document.getElementById('history-year-filter').classList.toggle('hidden', !checked);
            await loadGoals();
            if (checked) populateYearFilter();
        }

        function populateYearFilter() {
            const archivedGoals = goals.filter(g => g.archived && g.archived_at);
            const years = [...new Set(archivedGoals.map(g => new Date(g.archived_at).getFullYear()))].sort((a, b) => b - a);
            const sel = document.getElementById('history-year-filter');
            sel.innerHTML = `<option value="all">${t('All years')}</option>` +
                years.map(y => `<option value="${y}">${y}</option>`).join('');
        }

        function renderGoals() {
            const container = document.getElementById('goals-list');
            const activeGoals = goals.filter(g => !g.archived);
            const archivedGoals = goals.filter(g => g.archived);

            if (activeGoals.length === 0 && archivedGoals.length === 0) {
                container.innerHTML = `<div class="empty-state"><h3>${t('No learning goals defined')}</h3><p>${t('Add learning goals to define what students should achieve in this programme.')}</p></div>`;
                return;
            }

            // Group active goals by category
            const grouped = {};
            categories.forEach(cat => { grouped[cat.id] = { category: cat, goals: [] }; });
            activeGoals.forEach(goal => {
                if (grouped[goal.category.id]) grouped[goal.category.id].goals.push(goal);
            });

            const adminCols = isAdmin() ? `<th style="width:1%">${t('Order')}</th>` : '';
            const activeHtml = Object.values(grouped)
                .filter(g => g.goals.length > 0)
                .map(g => {
                    const catGoals = g.goals;
                    return `
                    <div class="card">
                        <h3 class="mb-1">${locName(g.category)}</h3>
                        <div class="table-container">
                            <table>
                                <thead><tr>
                                    ${adminCols}
                                    <th style="width:45%">${t('Goal')}</th>
                                    <th>${t('Measured')}</th>
                                    <th>${t('Target')}</th>
                                    <th>${t('Assigned Staff')}</th>
                                    <th></th>
                                </tr></thead>
                                <tbody>
                                    ${catGoals.map((goal, idx) => `
                                        <tr id="goal-row-${goal.id}">
                                            ${isAdmin() ? `
                                            <td style="white-space:nowrap">
                                                <button class="btn btn-sm btn-outline" style="padding:0.1rem 0.35rem;" ${idx === 0 ? 'disabled' : ''} onclick="moveGoal(${goal.id}, -1, ${g.category.id})" title="${t('Move up')}">▲</button>
                                                <button class="btn btn-sm btn-outline" style="padding:0.1rem 0.35rem;" ${idx === catGoals.length - 1 ? 'disabled' : ''} onclick="moveGoal(${goal.id}, 1, ${g.category.id})" title="${t('Move down')}">▼</button>
                                            </td>` : ''}
                                            <td>${goal.goal_eng || goal.goal_no}</td>
                                            <td>${goal.measure_direct && goal.measure_indirect ? `<span class="text-success">${t('Direct + Indirect')}</span>` : goal.measure_direct ? `<span class="text-success">${t('Direct')}</span>` : goal.measure_indirect ? `<span class="text-success">${t('Indirect')}</span>` : `<span class="text-muted">—</span>`}</td>
                                            <td>${goal.target_percentage}%</td>
                                            <td>${goal.assigned_staff.map(s => s.name).join(', ') || '-'}</td>
                                            <td class="text-right" style="white-space:nowrap">
                                                <button class="btn btn-sm btn-outline" onclick="showGoalDetail(${goal.id})">${canEditGoal(goal) ? t('View Rubrics') : t('View')}</button>
                                                ${isAdmin() ? `
                                                    <button class="btn btn-sm btn-outline" onclick="showEditGoalModal(${goal.id})">${t('Edit')}</button>
                                                    <button class="btn btn-sm btn-outline" style="color:#b45309" onclick="confirmArchiveGoal(${goal.id})">${t('Archive')}</button>
                                                ` : ''}
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>`;
                }).join('');

            let historyHtml = '';
            if (showHistory && archivedGoals.length > 0) {
                const yearFilter = document.getElementById('history-year-filter')?.value || 'all';
                let filtered = archivedGoals;
                if (yearFilter !== 'all') {
                    filtered = archivedGoals.filter(g => g.archived_at && new Date(g.archived_at).getFullYear() === parseInt(yearFilter));
                }

                const hGrouped = {};
                categories.forEach(cat => { hGrouped[cat.id] = { category: cat, goals: [] }; });
                filtered.forEach(goal => {
                    if (hGrouped[goal.category.id]) hGrouped[goal.category.id].goals.push(goal);
                });

                const hRows = Object.values(hGrouped).filter(g => g.goals.length > 0).map(g => `
                    <div class="card" style="opacity:0.75; border-left:3px solid #9ca3af;">
                        <h3 class="mb-1" style="color:#6b7280">${locName(g.category)} — ${t('Archived')}</h3>
                        <div class="table-container">
                            <table>
                                <thead><tr>
                                    <th style="width:45%">${t('Goal')}</th>
                                    <th>${t('Archived')}</th>
                                    <th>${t('Replaced by')}</th>
                                    <th></th>
                                </tr></thead>
                                <tbody>
                                    ${g.goals.map(goal => {
                                        const replacedBy = goal.superseded_by
                                            ? (goals.find(g2 => g2.id === goal.superseded_by) || null)
                                            : null;
                                        const archivedDate = goal.archived_at ? new Date(goal.archived_at).toLocaleDateString() : '—';
                                        return `<tr style="color:#6b7280">
                                            <td>${goal.goal_eng || goal.goal_no}</td>
                                            <td style="white-space:nowrap">${archivedDate}</td>
                                            <td>${replacedBy ? (replacedBy.goal_eng || replacedBy.goal_no || `#${replacedBy.id}`) : '—'}</td>
                                            <td class="text-right" style="white-space:nowrap">
                                                <button class="btn btn-sm btn-outline" onclick="showGoalDetail(${goal.id})">${t('View')}</button>
                                                ${isSystemAdmin() ? `<button class="btn btn-sm btn-outline" style="color:#059669" onclick="confirmRestoreGoal(${goal.id})">${t('Restore')}</button>` : ''}
                                            </td>
                                        </tr>`;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>`).join('');
                historyHtml = hRows || `<p class="text-muted" style="margin-top:1rem">${t('No archived goals for selected period.')}</p>`;
            }

            container.innerHTML = activeHtml + historyHtml;
        }

        async function moveGoal(goalId, direction, categoryId) {
            // Get all active goals in this category, sorted by sort_order
            const catGoals = goals.filter(g => !g.archived && g.category.id === categoryId);
            const idx = catGoals.findIndex(g => g.id === goalId);
            const swapIdx = idx + direction;
            if (swapIdx < 0 || swapIdx >= catGoals.length) return;

            // Swap sort_orders
            const a = catGoals[idx], b = catGoals[swapIdx];
            const tmpOrder = a.sort_order;
            a.sort_order = b.sort_order;
            b.sort_order = tmpOrder;
            // Ensure distinct if they were equal
            if (a.sort_order === b.sort_order) {
                b.sort_order = a.sort_order + (direction > 0 ? 1 : -1);
            }

            try {
                await api.reorderGoals(programmeId, goals.filter(g => !g.archived).map(g => ({ id: g.id, sort_order: g.sort_order })));
                renderGoals();
            } catch (error) {
                alert(t('Failed to reorder: ') + error.message);
                loadGoals(); // reload to reset
            }
        }

        async function confirmArchiveGoal(goalId) {
            if (!confirm(t('Archive this goal? It will no longer appear in the active programme, but all historical data will be preserved.'))) return;
            try {
                await api.archiveGoal(goalId);
                loadGoals();
            } catch (error) {
                alert(t('Failed to archive goal: ') + error.message);
            }
        }

        async function confirmRestoreGoal(goalId) {
            if (!confirm(t('Restore this goal to active status?'))) return;
            try {
                await api.unarchiveGoal(goalId);
                loadGoals();
            } catch (error) {
                alert(t('Failed to restore goal: ') + error.message);
            }
        }

        function showGoalDetail(goalId) {
            const goal = goals.find(g => g.id === goalId);
            if (!goal) return;

            document.getElementById('tab-goals').classList.add('hidden');
            document.getElementById('goal-detail').classList.remove('hidden');
            document.getElementById('goal-detail-title').textContent = goal.goal_eng || goal.goal_no;

            rubricComponent = new RubricComponent('rubrics-container', goalId);
            rubricComponent.setGoal(goal);
            window.app = { isAdmin, canEditGoal, user };
            rubricComponent.load();
        }

        function hideGoalDetail() {
            document.getElementById('tab-goals').classList.remove('hidden');
            document.getElementById('goal-detail').classList.add('hidden');
        }

        async function loadCourses() {
            const container = document.getElementById('courses-list');
            container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

            try {
                [courses, semesters] = await Promise.all([
                    api.getProgrammeCourses(programmeId),
                    semesters.length ? Promise.resolve(semesters) : api.getSemesters(),
                ]);
                renderCourses();
            } catch (error) {
                container.innerHTML = `<div class="alert alert-error">${error.message}</div>`;
            }
        }

        function renderCourses() {
            const container = document.getElementById('courses-list');

            if (courses.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>${t('No courses assigned')}</h3>
                        <p>${t('Add courses to this programme to build the curriculum matrix.')}</p>
                    </div>
                `;
                return;
            }

            const semesterOptions = semesters.map(s =>
                `<option value="${s.id}">${s.name}</option>`
            ).join('');

            container.innerHTML = `
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>${t('Code')}</th>
                                <th>${t('Name')}</th>
                                <th>ECTS</th>
                                <th>${t('Teaching Period')}</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${courses.map(course => {
                                const periodCell = isAdmin()
                                    ? `<td>
                                        <select class="form-select" style="min-width:130px; padding:0.2rem 0.5rem; font-size:0.875rem;"
                                            onchange="setTeachingPeriod(${course.id}, this)">
                                            <option value="">—</option>
                                            ${semesters.map(s =>
                                                `<option value="${s.id}" ${course.teaching_period_id === s.id ? 'selected' : ''}>${s.name}</option>`
                                            ).join('')}
                                        </select>
                                       </td>`
                                    : `<td>${course.teaching_period_name || '—'}</td>`;
                                return `
                                <tr>
                                    <td><strong>${course.course_code}</strong></td>
                                    <td>${locName(course) || '-'}</td>
                                    <td>${course.ects}</td>
                                    ${periodCell}
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        async function setTeachingPeriod(courseId, selectEl) {
            const periodId = selectEl.value ? parseInt(selectEl.value) : null;
            try {
                await api.setCourseTeachingPeriod(programmeId, courseId, periodId);
                const course = courses.find(c => c.id === courseId);
                if (course) {
                    course.teaching_period_id = periodId;
                    course.teaching_period_name = periodId
                        ? semesters.find(s => s.id === periodId)?.name || null
                        : null;
                }
            } catch (error) {
                alert(error.message);
                // Revert select
                const course = courses.find(c => c.id === courseId);
                selectEl.value = course?.teaching_period_id || '';
            }
        }

        function showAddGoalModal() {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal">
                    <div class="modal-header">
                        <h2>${t('Add Learning Goal')}</h2>
                        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">&times;</button>
                    </div>
                    <div class="modal-body">
                        <div class="form-group">
                            <label class="form-label">${t('Category')}</label>
                            <select id="goal-category" class="form-select" required>
                                ${categories.map(c => `<option value="${c.id}">${locName(c)}</option>`).join('')}
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">${t('Goal (English)')}</label>
                            <textarea id="goal-eng" class="form-textarea" required></textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label">${t('Goal (Norwegian)')}</label>
                            <textarea id="goal-no" class="form-textarea"></textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label">${t('Measurement')}</label>
                            <div style="display:flex; gap:1.25rem;">
                                <label style="cursor:pointer"><input type="checkbox" id="goal-direct"> ${t('Direct (course assessments)')}</label>
                                <label style="cursor:pointer"><input type="checkbox" id="goal-indirect"> ${t('Indirect (surveys etc.)')}</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">${t('Target % (meets or exceeds expectations)')}</label>
                            <input type="number" id="goal-target" class="form-input" value="80" min="0" max="100">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">${t('Cancel')}</button>
                        <button class="btn btn-primary" id="save-goal-btn">${t('Add Goal')}</button>
                    </div>
                </div>
            `;

            document.body.appendChild(modal);
            requestAnimationFrame(() => modal.classList.add('active'));

            document.getElementById('save-goal-btn').addEventListener('click', async () => {
                const data = {
                    goal_category: parseInt(document.getElementById('goal-category').value),
                    goal_eng: document.getElementById('goal-eng').value,
                    goal_no: document.getElementById('goal-no').value,
                    measure_direct: document.getElementById('goal-direct').checked,
                    measure_indirect: document.getElementById('goal-indirect').checked,
                    target_percentage: parseFloat(document.getElementById('goal-target').value),
                };

                if (!data.goal_eng) {
                    alert(t('Goal description is required'));
                    return;
                }

                try {
                    await api.createGoal(programmeId, data);
                    modal.remove();
                    loadGoals();
                } catch (error) {
                    alert(t('Failed to create goal: ') + error.message);
                }
            });
        }

        function showEditGoalModal(goalId) {
            const goal = goals.find(g => g.id === goalId);
            if (!goal) return;

            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal">
                    <div class="modal-header">
                        <h2>${t('Edit Learning Goal')}</h2>
                        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">&times;</button>
                    </div>
                    <div class="modal-body">
                        <div class="form-group">
                            <label class="form-label">${t('Category')}</label>
                            <select id="goal-category" class="form-select" required>
                                ${categories.map(c => `<option value="${c.id}" ${c.id === goal.category.id ? 'selected' : ''}>${locName(c)}</option>`).join('')}
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">${t('Goal (English)')}</label>
                            <textarea id="goal-eng" class="form-textarea" required>${goal.goal_eng || ''}</textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label">${t('Goal (Norwegian)')}</label>
                            <textarea id="goal-no" class="form-textarea">${goal.goal_no || ''}</textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label">${t('Measurement')}</label>
                            <div style="display:flex; gap:1.25rem;">
                                <label style="cursor:pointer"><input type="checkbox" id="goal-direct" ${goal.measure_direct ? 'checked' : ''}> ${t('Direct (course assessments)')}</label>
                                <label style="cursor:pointer"><input type="checkbox" id="goal-indirect" ${goal.measure_indirect ? 'checked' : ''}> ${t('Indirect (surveys etc.)')}</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">${t('Target % (meets or exceeds expectations)')}</label>
                            <input type="number" id="goal-target" class="form-input" value="${goal.target_percentage}" min="0" max="100">
                        </div>
                        <div class="form-group" style="border-top:1px solid #e5e7eb; padding-top:1rem; margin-top:0.5rem;">
                            <label class="form-label">${t('Revision type')}</label>
                            <div style="display:flex; gap:1rem;">
                                <label style="cursor:pointer"><input type="radio" name="revision-type" value="minor" checked> ${t('Minor — fix wording, preserve history')}</label>
                                <label style="cursor:pointer"><input type="radio" name="revision-type" value="major"> ${t('Major — new measurement history')}</label>
                            </div>
                            <div id="major-revision-warning" style="display:none; margin-top:0.5rem; padding:0.6rem 0.75rem; background:#fef3c7; border:1px solid #f59e0b; border-radius:4px; font-size:0.875rem; color:#92400e;">
                                ⚠ ${t('This will archive the current goal and start a new measurement history. Course mappings will not be carried over.')}
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-danger" onclick="deleteGoal(${goalId}); this.closest('.modal-overlay').remove();">${t('Delete')}</button>
                        <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">${t('Cancel')}</button>
                        <button class="btn btn-primary" id="save-goal-btn">${t('Save')}</button>
                    </div>
                </div>
            `;

            document.body.appendChild(modal);
            requestAnimationFrame(() => modal.classList.add('active'));

            // Show/hide major revision warning
            modal.querySelectorAll('input[name="revision-type"]').forEach(radio => {
                radio.addEventListener('change', () => {
                    document.getElementById('major-revision-warning').style.display =
                        radio.value === 'major' && radio.checked ? 'block' : 'none';
                });
            });

            document.getElementById('save-goal-btn').addEventListener('click', async () => {
                const revisionType = modal.querySelector('input[name="revision-type"]:checked')?.value || 'minor';
                const data = {
                    goal_category: parseInt(document.getElementById('goal-category').value),
                    goal_eng: document.getElementById('goal-eng').value,
                    goal_no: document.getElementById('goal-no').value,
                    measure_direct: document.getElementById('goal-direct').checked,
                    measure_indirect: document.getElementById('goal-indirect').checked,
                    target_percentage: parseFloat(document.getElementById('goal-target').value),
                    revision_type: revisionType,
                };

                try {
                    await api.updateGoal(goalId, data);
                    modal.remove();
                    loadGoals();
                } catch (error) {
                    alert(t('Failed to update goal: ') + error.message);
                }
            });
        }

        async function deleteGoal(goalId) {
            if (!confirm(t('Are you sure you want to delete this goal? This will also delete all associated rubrics and assessments.'))) {
                return;
            }

            try {
                await api.deleteGoal(goalId);
                loadGoals();
            } catch (error) {
                alert(t('Failed to delete goal: ') + error.message);
            }
        }

        function showAddCourseModal() {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal">
                    <div class="modal-header">
                        <h2>${t('Add Course to Programme')}</h2>
                        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">&times;</button>
                    </div>
                    <div class="modal-body">
                        <div class="form-group">
                            <label class="form-label">${t('Search Course')}</label>
                            <input type="text" id="course-search" class="form-input" placeholder="${t('Type course code or name...')}">
                        </div>
                        <div id="course-results" class="mt-1"></div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">${t('Close')}</button>
                    </div>
                </div>
            `;

            document.body.appendChild(modal);
            requestAnimationFrame(() => modal.classList.add('active'));

            const searchInput = document.getElementById('course-search');
            const resultsContainer = document.getElementById('course-results');
            let searchTimeout;

            searchInput.addEventListener('input', () => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(async () => {
                    const query = searchInput.value.trim();
                    if (query.length < 2) {
                        resultsContainer.innerHTML = '';
                        return;
                    }

                    try {
                        const results = await api.searchCourses(query);
                        resultsContainer.innerHTML = results.map(course => `
                            <div class="card" style="padding: 0.75rem; cursor: pointer;" onclick="addCourseToProgramme(${course.id}, this)">
                                <strong>${course.course_code}-${course.course_version}</strong> - ${locName(course) || t('No name')}
                                <span class="text-muted text-sm">(${course.ects} ECTS)</span>
                            </div>
                        `).join('');
                    } catch (error) {
                        resultsContainer.innerHTML = `<div class="alert alert-error">${error.message}</div>`;
                    }
                }, 300);
            });
        }

        async function addCourseToProgramme(courseId, element) {
            try {
                await api.addCourseToProgramme(programmeId, courseId);
                element.innerHTML += ` <span class="text-success">${t('Added!')}</span>`;
                element.style.pointerEvents = 'none';
                courses = [];
                if (!document.getElementById('tab-courses').classList.contains('hidden')) {
                    loadCourses();
                }
            } catch (error) {
                alert(t('Failed to add course: ') + error.message);
            }
        }

        // ============================================
        // Measurement Plan Tab
        // ============================================

        async function loadMeasurementPlan() {
            planLoaded = true;
            const container = document.getElementById('plan-container');
            container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            try {
                const [years, schedule] = await Promise.all([
                    api.getAcademicYears(),
                    api.getProgrammeSchedule(programmeId),
                ]);
                // Keep current year + next 5, oldest first
                const today = new Date();
                const currentYearStart = today.getMonth() >= 7 ? today.getFullYear() : today.getFullYear() - 1;
                const relevantYearNames = [0, 1, 2, 3, 4, 5].map(offset => {
                    const y = currentYearStart + offset;
                    return `${String(y).slice(2)}/${String(y + 1).slice(2)}`;
                });
                planYears = years.filter(y => relevantYearNames.includes(y.name)).reverse();
                planSchedule = schedule;
                renderMeasurementPlan();
            } catch (error) {
                container.innerHTML = `<div class="alert alert-error">${error.message}</div>`;
            }
        }

        function renderMeasurementPlan() {
            const container = document.getElementById('plan-container');
            const activeGoals = goals.filter(g => !g.archived);

            if (activeGoals.length === 0) {
                container.innerHTML = `<div class="empty-state"><h3>${t('No active goals')}</h3></div>`;
                return;
            }

            // Build schedule lookup: scheduleMap[goal_id][year_id] = entry_id
            const scheduleMap = {};
            planSchedule.forEach(e => {
                if (!scheduleMap[e.goal_id]) scheduleMap[e.goal_id] = {};
                scheduleMap[e.goal_id][e.academic_year_id] = e.id;
            });

            // Group goals by category
            const grouped = {};
            categories.forEach(cat => { grouped[cat.id] = { category: cat, goals: [] }; });
            activeGoals.forEach(g => { if (grouped[g.category.id]) grouped[g.category.id].goals.push(g); });

            const colHeaders = planYears.map(y =>
                `<th style="text-align:center; font-size:0.85rem; padding:0.4rem 0.75rem; min-width:90px;">${y.name}</th>`
            ).join('');

            const rows = Object.values(grouped)
                .filter(g => g.goals.length > 0)
                .map(g => {
                    const catRow = `<tr style="background:#f3f4f6;">
                        <td colspan="${planYears.length + 1}" style="font-weight:600; padding:0.4rem 0.75rem; font-size:0.875rem;">${locName(g.category)}</td>
                    </tr>`;
                    const goalRows = g.goals.map(goal => {
                        const cells = planYears.map(y => {
                            const entryId = scheduleMap[goal.id]?.[y.id];
                            if (isAdmin()) {
                                return entryId
                                    ? `<td style="text-align:center; padding:0.25rem;">
                                        <button class="btn btn-sm" style="background:#d1fae5; color:#065f46; border:1px solid #6ee7b7; min-width:2.5rem;"
                                            onclick="toggleSchedule(${goal.id}, ${y.id}, ${entryId})">✓</button>
                                       </td>`
                                    : `<td style="text-align:center; padding:0.25rem;">
                                        <button class="btn btn-sm btn-outline" style="color:#9ca3af; min-width:2.5rem;"
                                            onclick="toggleSchedule(${goal.id}, ${y.id}, null)">+</button>
                                       </td>`;
                            } else {
                                return `<td style="text-align:center; padding:0.25rem; color:${entryId ? '#059669' : '#d1d5db'}; font-size:1.1rem;">
                                    ${entryId ? '✓' : '·'}
                                </td>`;
                            }
                        }).join('');
                        const goalText = goal.goal_eng || goal.goal_no || '';
                        return `<tr>
                            <td style="padding:0.4rem 0.75rem; font-size:0.875rem; max-width:420px;">
                                <span title="${goalText}">${goalText.length > 100 ? goalText.slice(0, 97) + '…' : goalText}</span>
                            </td>
                            ${cells}
                        </tr>`;
                    }).join('');
                    return catRow + goalRows;
                }).join('');

            container.innerHTML = `
                <div class="flex-between mb-2">
                    <h2>${t('Measurement Plan')}</h2>
                    <p class="text-sm text-muted">${t('Schedule when each goal will be assessed. Click ✓ to remove, + to add.')}</p>
                </div>
                <div style="overflow-x:auto;">
                    <table style="width:100%; border-collapse:collapse; font-size:0.875rem;">
                        <thead>
                            <tr style="border-bottom:2px solid #e5e7eb;">
                                <th style="text-align:left; padding:0.5rem 0.75rem; min-width:300px;">${t('Goal')}</th>
                                ${colHeaders}
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
            `;
        }

        async function toggleSchedule(goalId, yearId, existingEntryId) {
            try {
                if (existingEntryId) {
                    await api.deleteGoalSchedule(goalId, existingEntryId);
                    planSchedule = planSchedule.filter(e => e.id !== existingEntryId);
                } else {
                    const entry = await api.addGoalSchedule(goalId, { academic_year_id: yearId });
                    planSchedule.push({ id: entry.id, goal_id: goalId, academic_year_id: yearId });
                }
                renderMeasurementPlan();
            } catch (error) {
                alert(t('Failed to update schedule: ') + error.message);
            }
        }

        // ============================================
        // Results Tab (Table 5.1)
        // ============================================

        async function loadResults() {
            resultsLoaded = true;
            const container = document.getElementById('results-container');
            container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            try {
                const data = await api.getProgrammeResults(programmeId);
                await loadChartJs();
                renderResults(data, container);
            } catch (error) {
                container.innerHTML = `<div class="alert alert-error">${error.message}</div>`;
            }
        }

        function loadChartJs() {
            return new Promise(resolve => {
                if (window.Chart) { resolve(); return; }
                const s = document.createElement('script');
                s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js';
                s.onload = resolve;
                document.head.appendChild(s);
            });
        }

        function renderResults(data, container) {
            if (data.length === 0) {
                container.innerHTML = `<div class="empty-state"><h3>${t('No rubrics found')}</h3><p>${t('Add rubrics to learning goals to see results here.')}</p></div>`;
                return;
            }

            const direct = data.filter(r => r.measure_type === 'direct');
            const indirect = data.filter(r => r.measure_type === 'indirect');

            container.innerHTML = `
                ${direct.length ? buildTable51(direct, t('Direct Measures')) : ''}
                ${indirect.length ? buildTable51(indirect, t('Indirect Measures')) : ''}
                ${buildCharts(data)}
            `;

            initCharts(data);
        }

        function buildTable51(rows, title) {
            // Group rows by goal_id to compute rowspans
            const goalOrder = [];
            const byGoal = {};
            rows.forEach(r => {
                if (!byGoal[r.goal_id]) { byGoal[r.goal_id] = []; goalOrder.push(r.goal_id); }
                byGoal[r.goal_id].push(r);
            });

            const tbodyRows = goalOrder.flatMap(goalId => {
                const goalRows = byGoal[goalId];
                return goalRows.map((row, idx) => {
                    const goalCols = idx === 0 ? `
                        <td rowspan="${goalRows.length}" style="vertical-align:top; padding:0.5rem 0.75rem;">
                            <div class="text-sm text-muted" style="margin-bottom:0.2rem;">${row.category_name}</div>
                            <div style="font-size:0.875rem;">${row.goal_text}</div>
                        </td>
                        <td rowspan="${goalRows.length}" style="vertical-align:top; text-align:center; padding:0.5rem 0.75rem; white-space:nowrap; font-size:0.875rem;">
                            ≥${row.target_pct}%<br>
                            <span class="text-muted" style="font-size:0.75rem;">${t('Meet or Exceed')}</span>
                        </td>` : '';

                    const resultsHtml = row.assessments.length
                        ? row.assessments.map(a => {
                            const pct = a.meets_exceeds_pct !== null ? a.meets_exceeds_pct + '%' : '—';
                            const col = a.meets_exceeds_pct !== null
                                ? (a.meets_exceeds_pct >= row.target_pct ? '#16a34a' : '#dc2626')
                                : '#6b7280';
                            return `<div style="font-size:0.8rem; margin-bottom:0.15rem;">
                                <strong>${a.year_name}:</strong>
                                <span style="color:${col}; font-weight:600;">${pct}</span>
                                <span class="text-muted">&nbsp;(${a.overall_dnm}&nbsp;DNM&nbsp;/&nbsp;${a.overall_meets}&nbsp;M&nbsp;/&nbsp;${a.overall_exceeds}&nbsp;E)</span>
                            </div>`;
                        }).join('')
                        : `<span class="text-muted">—</span>`;

                    return `<tr style="border-bottom:1px solid #e5e7eb;">
                        ${goalCols}
                        <td style="vertical-align:top; padding:0.5rem 0.75rem; font-size:0.875rem;">
                            ${row.rubric_name}
                        </td>
                        <td style="vertical-align:top; padding:0.5rem 0.75rem; font-size:0.875rem;">
                            ${row.courses.join(', ') || '—'}
                        </td>
                        <td style="vertical-align:top; padding:0.5rem 0.75rem; font-size:0.875rem;">
                            ${row.teaching_periods.join(', ') || '—'}
                        </td>
                        <td style="vertical-align:top; padding:0.5rem 0.75rem;">${resultsHtml}</td>
                        <td style="vertical-align:top; padding:0.5rem 0.75rem;"></td>
                        <td style="vertical-align:top; padding:0.5rem 0.75rem;"></td>
                    </tr>`;
                });
            }).join('');

            return `
                <h3 style="margin:1.5rem 0 0.5rem; font-size:1rem; text-transform:uppercase; letter-spacing:0.05em; color:#374151;">${title}</h3>
                <div style="overflow-x:auto; margin-bottom:2rem;">
                    <table style="width:100%; border-collapse:collapse; font-size:0.875rem; border:1px solid #d1d5db;">
                        <thead>
                            <tr style="background:#f3f4f6; font-size:0.8rem; text-transform:uppercase; letter-spacing:0.03em;">
                                <th style="padding:0.5rem 0.75rem; text-align:left; border:1px solid #d1d5db; min-width:200px;">${t('Competency')}</th>
                                <th style="padding:0.5rem 0.75rem; text-align:center; border:1px solid #d1d5db; min-width:110px;">${t('Performance Target')}</th>
                                <th style="padding:0.5rem 0.75rem; text-align:left; border:1px solid #d1d5db; min-width:140px;">${t('How Assessed')}</th>
                                <th style="padding:0.5rem 0.75rem; text-align:left; border:1px solid #d1d5db; min-width:100px;">${t('Where Assessed')}</th>
                                <th style="padding:0.5rem 0.75rem; text-align:left; border:1px solid #d1d5db; min-width:110px;">${t('When Assessed')}</th>
                                <th style="padding:0.5rem 0.75rem; text-align:left; border:1px solid #d1d5db; min-width:180px;">${t('Results')}</th>
                                <th style="padding:0.5rem 0.75rem; text-align:left; border:1px solid #d1d5db; min-width:150px;">${t('Curricular Improvements')}</th>
                                <th style="padding:0.5rem 0.75rem; text-align:left; border:1px solid #d1d5db; min-width:110px;">${t('Date Changes Made')}</th>
                            </tr>
                        </thead>
                        <tbody>${tbodyRows}</tbody>
                    </table>
                </div>
            `;
        }

        function buildCharts(data) {
            // Only goals that have at least one rubric with assessments
            const goalOrder = [];
            const byGoal = {};
            data.forEach(r => {
                if (!byGoal[r.goal_id]) { byGoal[r.goal_id] = { text: r.goal_text, target_pct: r.target_pct, rubrics: [] }; goalOrder.push(r.goal_id); }
                if (r.assessments.length > 0) byGoal[r.goal_id].rubrics.push(r);
            });

            const goalsWithData = goalOrder.filter(id => byGoal[id].rubrics.length > 0);
            if (!goalsWithData.length) return '';

            return `
                <h3 style="margin:1.5rem 0 1rem; font-size:1rem; text-transform:uppercase; letter-spacing:0.05em; color:#374151;">${t('Results Charts')}</h3>
                <div class="grid grid-2" style="gap:1.5rem; margin-bottom:2rem;">
                    ${goalsWithData.map(goalId => {
                        const goal = byGoal[goalId];
                        return goal.rubrics.map(r => `
                            <div class="card">
                                <div class="text-sm text-muted mb-1">${r.category_name} › ${r.rubric_name}</div>
                                <div style="font-size:0.85rem; margin-bottom:0.75rem;">${r.goal_text.length > 90 ? r.goal_text.slice(0, 90) + '…' : r.goal_text}</div>
                                <canvas id="chart-rubric-${r.rubric_id}" height="160"></canvas>
                            </div>
                        `).join('');
                    }).join('')}
                </div>
            `;
        }

        function initCharts(data) {
            data.forEach(r => {
                if (!r.assessments.length) return;
                const canvas = document.getElementById(`chart-rubric-${r.rubric_id}`);
                if (!canvas) return;

                const labels = r.assessments.map(a => a.year_name);
                const dnmPcts = r.assessments.map(a => a.total > 0 ? Math.round(a.overall_dnm / a.total * 100) : 0);
                const meetsPcts = r.assessments.map(a => a.total > 0 ? Math.round(a.overall_meets / a.total * 100) : 0);
                const exceedsPcts = r.assessments.map(a => a.total > 0 ? Math.round(a.overall_exceeds / a.total * 100) : 0);

                new Chart(canvas, {
                    type: 'bar',
                    data: {
                        labels,
                        datasets: [
                            { label: t('Exceeds'), data: exceedsPcts, backgroundColor: '#22c55e', stack: 'a' },
                            { label: t('Meets'), data: meetsPcts, backgroundColor: '#f59e0b', stack: 'a' },
                            { label: t('Does Not Meet'), data: dnmPcts, backgroundColor: '#ef4444', stack: 'a' },
                        ],
                    },
                    options: {
                        responsive: true,
                        scales: {
                            x: { stacked: true },
                            y: {
                                stacked: true, min: 0, max: 100,
                                ticks: { callback: v => v + '%' },
                            },
                        },
                        plugins: {
                            legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } },
                            tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.raw}%` } },
                            annotation: undefined,
                        },
                    },
                    plugins: [{
                        id: 'targetLine',
                        afterDraw(chart) {
                            const { ctx, chartArea: { left, right }, scales: { y } } = chart;
                            const yPx = y.getPixelForValue(r.target_pct);
                            ctx.save();
                            ctx.beginPath();
                            ctx.setLineDash([6, 4]);
                            ctx.strokeStyle = '#1e40af';
                            ctx.lineWidth = 2;
                            ctx.moveTo(left, yPx);
                            ctx.lineTo(right, yPx);
                            ctx.stroke();
                            ctx.setLineDash([]);
                            ctx.fillStyle = '#1e40af';
                            ctx.font = '11px sans-serif';
                            ctx.fillText(`${t('Target')}: ${r.target_pct}%`, right - 90, yPx - 4);
                            ctx.restore();
                        },
                    }],
                });
            });
        }

        // Initialize
        init();
    </script>
</body>
</html>
